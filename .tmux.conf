##### ===========================
#####  SECTION 1 — BASIC OPTIONS
##### ===========================

set -g mode-keys vi
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g status-interval 5
set -g status-position bottom

##### ===========================
#####  SECTION 2 — KEYBINDINGS
##### ===========================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

bind '"' split-window -v -c "#{pane_current_path}" -l 12
bind %   split-window -h -c "#{pane_current_path}"

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

##### ===========================
#####  SECTION 3 — STYLE / PALETTE
##### ===========================

# Status bar background + default text color
set -g status-style "bg=#0d0c14,fg=#e0def4"

# Window list styling (inactive / active)
set -g window-status-style "bg=#0d0c14,fg=#e0def4,bold"
set -g window-status-current-style "bg=#eb6f92,fg=#0d0c14"

set -g status-left-length 20
set -g status-right-length 120

##### ===========================
#####  SECTION 4 — PREFIX INDICATOR (safe)
##### ===========================

# Session name block that changes color while prefix is active.
# NOTE: use spaces inside #[...] so we don't introduce extra commas inside the conditional.
set -g status-left '#{?client_prefix,#[fg=#1f1d2e bg=#eb6f92],#[fg=#e0def4 bg=#0d0c14]} [#{session_name}] #[default]'

##### ===========================
#####  SECTION 5 — STATUS CONTENT (git, panes, zoom)
##### ===========================

# Small PREFIX badge when prefix is active (no nested commas)
# Zoom/panes: avoid commas inside the style blocks used inside conditionals.
# Git branch: safe shell command; prints nothing if not a repo.
set -g status-right '#{?client_prefix,#[fg=#1f1d2e bg=#eb6f92] PREFIX #[default],}#{?window_zoomed_flag,#[fg=#e8c88c]Panes: #{window_panes}#[default],#[fg=#3d3846]Panes: #{window_panes}#[default]}  | #[fg=#89b4fa] #(cd "#{pane_current_path}" && git rev-parse --abbrev-ref HEAD 2>/dev/null || true)#[default] | #[fg=#908caa]#H#[default] | #[fg=#e0def4]%H:%M  %A %d.%m.%y#[default]'
##### ===========================
#####  SECTION 6 — MISC
##### ===========================

set -g status-keys vi
# End of config
